name: Backend CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore Dependencies
        run: dotnet restore TruckManagement.sln

      - name: Build the Solution
        run: dotnet build TruckManagement.sln --configuration Release

      - name: Run Tests
        run: dotnet test TruckManagement.sln --configuration Release --no-build --verbosity normal || echo "No tests found"
      
      - name: Build Complete
        run: |
          echo "✅ Build and tests passed"
          echo "📝 Commit: ${GITHUB_SHA:0:7}"
          echo "👤 By: $GITHUB_ACTOR"
          echo ""
          echo "ℹ️  Deployment is triggered by GitHub webhook (not this workflow)"
          echo "🔗 Configure at: https://github.com/${{ github.repository }}/settings/hooks"
