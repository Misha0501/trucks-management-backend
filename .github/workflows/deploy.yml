name: Backend CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore Dependencies
        run: dotnet restore TruckManagement.sln

      - name: Build the Solution
        run: dotnet build TruckManagement.sln --configuration Release

      - name: Run Tests
        run: dotnet test TruckManagement.sln --configuration Release --no-build --verbosity normal || echo "No tests found"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Test Webhook Connectivity
        run: |
          echo "Testing connectivity to webhook endpoint..."
          curl -v --connect-timeout 10 http://${{ secrets.SERVER_IP }}:8888/health || {
            echo "❌ Cannot reach webhook endpoint"
            echo "Trying to ping server..."
            ping -c 3 ${{ secrets.SERVER_IP }} || echo "Ping failed"
            exit 1
          }

      - name: Trigger Deployment via Webhook
        run: |
          PAYLOAD='{"ref":"refs/heads/main","repository":{"name":"trucks-management-backend"}}'
          
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | cut -d' ' -f2)"
          
          echo "Sending webhook request..."
          
          RESPONSE=$(curl -v --connect-timeout 30 --max-time 60 -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD" \
            http://${{ secrets.SERVER_IP }}:8888/webhook 2>&1)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "Response: $BODY"
          echo "HTTP Code: $HTTP_CODE"
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Deployment triggered successfully"
            echo "🔗 API: https://api.vervoermanager.nl"
            echo "📝 Commit: ${GITHUB_SHA:0:7}"
            echo "👤 Deployed by: $GITHUB_ACTOR"
            exit 0
          else
            echo "❌ Deployment trigger failed"
            exit 1
          fi
