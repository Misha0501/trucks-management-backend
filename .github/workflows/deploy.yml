name: Deploy Backend to AWS Lightsail (Zero Downtime)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up .NET environment
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x' 

      - name: Build the Solution
        run: |
          dotnet build TruckManagement.sln --configuration Release

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Trigger Deployment on Server
        run: |
          max_retries=5
          retry_count=0
          
          while [ $retry_count -lt $max_retries ]; do
            echo "🚀 Deployment attempt $((retry_count + 1))/$max_retries..."
            
            if ssh -o ConnectTimeout=60 -o ConnectionAttempts=1 -o ServerAliveInterval=30 \
                   ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
                   'sudo /usr/local/bin/deploy-backend' 2>&1; then
              echo "✅ Deployment completed successfully!"
              exit 0
            else
              exit_code=$?
              retry_count=$((retry_count + 1))
              
              if [ $retry_count -lt $max_retries ]; then
                wait_time=$((10 + retry_count * 5))
                echo "⚠️  Attempt failed with exit code $exit_code, waiting ${wait_time}s before retry..."
                sleep $wait_time
              else
                echo "❌ Deployment failed after $max_retries attempts"
                exit 1
              fi
            fi
          done

      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Backend deployment completed successfully"
          echo "🔗 API: https://api.vervoermanager.nl"
          echo "📝 Commit: ${{ github.sha }}"
          echo "👤 Deployed by: ${{ github.actor }}"
