name: Backend Build Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore Dependencies
        run: dotnet restore TruckManagement.sln

      - name: Build the Solution
        run: dotnet build TruckManagement.sln --configuration Release

      - name: Run Tests
        run: dotnet test TruckManagement.sln --configuration Release --no-build --verbosity normal || echo "No tests found"
      
      - name: Build Successful
        if: success()
        run: |
          echo "✅ Build validation passed"
          echo "📝 Commit: ${GITHUB_SHA:0:7}"
