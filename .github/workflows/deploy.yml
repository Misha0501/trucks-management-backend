name: Backend CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore Dependencies
        run: dotnet restore TruckManagement.sln

      - name: Build the Solution
        run: dotnet build TruckManagement.sln --configuration Release

      - name: Run Tests
        run: dotnet test TruckManagement.sln --configuration Release --no-build --verbosity normal || echo "No tests found"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Trigger Deployment via Webhook
        run: |
          PAYLOAD='{"ref":"'"$GITHUB_REF"'","repository":{"name":"'"$GITHUB_REPOSITORY"'"},"head_commit":{"id":"'"$GITHUB_SHA"'","message":"'"$(git log -1 --pretty=%B | head -1)"'"},"pusher":{"name":"'"$GITHUB_ACTOR"'"}}'
          
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | cut -d' ' -f2)"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD" \
            http://${{ secrets.SERVER_IP }}:8888/webhook)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "Response: $BODY (HTTP $HTTP_CODE)"
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Deployment triggered successfully"
            echo "🔗 API: https://api.vervoermanager.nl"
            echo "📝 Commit: ${GITHUB_SHA:0:7}"
            echo "👤 Deployed by: $GITHUB_ACTOR"
            exit 0
          else
            echo "❌ Deployment trigger failed"
            exit 1
          fi
